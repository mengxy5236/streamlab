spring.application.name=streamlab
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/streamlabDB?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.jwt.secret=${JWT_SECRET}
spring.jwt.access-token-expiration=900
spring.jwt.refresh-token-expiration=604800

mybatis.mapper-locations=classpath:mapper/*.xml

# File Upload Configuration
file.upload-dir=uploads/
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Aliyun OSS Configuration
aliyun.oss.endpoint=oss-cn-beijing.aliyuncs.com
aliyun.oss.accessKeyId=${OSS_ACCESS_KEY_ID:local-dev-access-key}
aliyun.oss.accessKeySecret=${OSS_ACCESS_KEY_SECRET:local-dev-access-secret}
aliyun.oss.bucketName=streamlab

# FFmpeg Configuration
ffmpeg.path=ffmpeg
ffmpeg.ffprobe=ffprobe
ffmpeg.timeout-minutes=30
ffmpeg.ffprobe-timeout-seconds=10

# HLS Configuration
upload.hls.segment-duration=10
upload.hls.output-dir=${java.io.tmpdir}/hls

# Redis Configuration
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=3000

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}
spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.rabbitmq.listener.simple.missing-queues-fatal=false
streamlab.transcode.messaging-enabled=false

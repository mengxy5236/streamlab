spring.application.name=streamlab

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/streamlabDB?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.jwt.secret=${JWT_SECRET}
spring.jwt.access-token-expiration=900
spring.jwt.refresh-token-expiration=604800

mybatis.mapper-locations=classpath:mapper/*.xml

# File Upload Configuration
file.upload-dir=uploads/
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Aliyun OSS Configuration
aliyun.oss.endpoint=oss-cn-beijing.aliyuncs.com
aliyun.oss.accessKeyId=${OSS_ACCESS_KEY_ID}
aliyun.oss.accessKeySecret=${OSS_ACCESS_KEY_SECRET}
aliyun.oss.bucketName=streamlab

# FFmpeg Configuration
ffmpeg.path=ffmpeg
ffmpeg.ffprobe=ffprobe
ffmpeg.timeout-minutes=30
ffmpeg.ffprobe-timeout-seconds=10

# HLS Configuration
upload.hls.segment-duration=10
upload.hls.output-dir=${java.io.tmpdir}/hls

# Redis Configuration
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=3000

# Kafka Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=streamlab-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Kafka Consumer Groups
spring.kafka.properties.streamlab-group=streamlab-group
